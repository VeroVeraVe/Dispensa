<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Dispensa"/>
<title>🥫 La Mia Dispensa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #FAF7F2; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #2C2417; }
input, select, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SK = { inv:"dispensa_inventory", base:"dispensa_baseMenu2", weekly:"dispensa_weeklyMenus2" };
const load = (k, fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

const DAYS = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
const MEALS = ["Pranzo","Cena"];
const WEEKS = ["Settimana 1","Settimana 2"];
const CATEGORIES = ["Pasta & Riso","Carne","Pesce","Verdura","Frutta","Latticini","Scatolame","Pane & Cereali","Bevande","Detersivi","Altro"];
const CAT_ICONS = {"Pasta & Riso":"🍝","Carne":"🥩","Pesce":"🐟","Verdura":"🥦","Frutta":"🍎","Latticini":"🧀","Scatolame":"🥫","Pane & Cereali":"🍞","Bevande":"🥤","Detersivi":"🧴","Altro":"📦"};
const UNITS = ["pz","kg","g","L","ml","conf","busta","barattolo","bottiglia"];

// Base menu: { "Settimana 1": { "Lunedì": { "Pranzo": ["Pasta","Pollo"], "Cena": [] } } }
const emptyBase = () => {
  const m={};
  WEEKS.forEach(w=>{
    m[w]={};
    DAYS.forEach(d=>{ m[w][d]={Pranzo:[],Cena:[]}; });
  });
  return m;
};

const getWeekKey = (date) => {
  const d=new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()+1);
  return d.toISOString().slice(0,10);
};

const fmtDate = (iso) => { if(!iso) return "—"; const [y,m,d]=iso.split("-"); return d+"/"+m+"/"+y; };

const expiryStatus = (iso) => {
  if(!iso) return "ok";
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.ceil((new Date(iso)-today)/86400000);
  if(diff<0) return "expired"; if(diff<=7) return "soon"; return "ok";
};

const ST = {
  ok:      {bg:"#e8f5e9",color:"#2e7d32",label:"OK"},
  soon:    {bg:"#fff8e1",color:"#f57f17",label:"In scadenza"},
  expired: {bg:"#ffebee",color:"#c62828",label:"Scaduto"}
};

const inp = {padding:"8px 10px",borderRadius:8,border:"1.5px solid #d4c9b8",background:"#fff",fontSize:14,width:"100%"};
const lbl = {display:"block",fontSize:12,fontWeight:600,color:"#6B4E3D",marginBottom:4};
const sBtn = {border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontWeight:600,fontSize:14,background:"#f0ebe3",color:"#2C2417"};
const btn = (bg,sm) => ({background:bg,color:"#fff",border:"none",borderRadius:8,padding:sm?"6px 12px":"8px 16px",fontWeight:600,fontSize:sm?13:14,cursor:"pointer",whiteSpace:"nowrap"});

// ── CELL EDITOR: lista di portate con + e x ───────────────────
function CellEditor({dishes, onSave, onCancel}) {
  const [items, setItems] = useState(dishes.length>0 ? [...dishes] : [""]);
  const update = (i,v) => { const a=[...items]; a[i]=v; setItems(a); };
  const addRow = () => setItems(a=>[...a,""]);
  const removeRow = (i) => { const a=items.filter((_,j)=>j!==i); setItems(a.length?a:[""]); };
  const commit = () => onSave(items.filter(s=>s.trim()));

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:4,minWidth:100}},
    items.map((v,i)=>React.createElement("div",{key:i,style:{display:"flex",gap:3,alignItems:"center"}},
      React.createElement("input",{autoFocus:i===0,value:v,onChange:e=>update(i,e.target.value),
        onKeyDown:e=>{if(e.key==="Enter"){e.preventDefault();if(i===items.length-1)addRow();}if(e.key==="Escape")onCancel();},
        style:{flex:1,padding:"3px 5px",borderRadius:5,border:"1.5px solid #5C7A5A",fontSize:11}}),
      items.length>1&&React.createElement("button",{onClick:()=>removeRow(i),
        style:{border:"none",background:"none",color:"#c62828",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}},"×")
    )),
    React.createElement("div",{style:{display:"flex",gap:3,marginTop:2}},
      React.createElement("button",{onClick:addRow,style:{...sBtn,fontSize:10,padding:"2px 6px",background:"#e8f5e9",color:"#2e7d32"}},"+"),
      React.createElement("button",{onClick:commit,style:{...sBtn,fontSize:10,padding:"2px 6px",background:"#e8f5e9",color:"#2e7d32",flex:1}},"✓ OK"),
      React.createElement("button",{onClick:onCancel,style:{...sBtn,fontSize:10,padding:"2px 6px",background:"#ffebee",color:"#c62828"}},"✕")
    )
  );
}

// ── CELL DISPLAY ──────────────────────────────────────────────
function CellDisplay({dishes, onClick, consumed, onConsume}) {
  if(dishes.length===0) return React.createElement("div",{onClick,
    style:{cursor:"pointer",minHeight:34,borderRadius:6,fontSize:11,color:"#ccc",
      border:"1px dashed #e0d9d0",display:"flex",alignItems:"center",justifyContent:"center"}},"+");

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:2}},
    dishes.map((d,i)=>{
      const isCons=consumed&&consumed[i];
      return React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:2}},
        React.createElement("div",{onClick,style:{flex:1,cursor:"pointer",padding:"2px 4px",borderRadius:5,fontSize:11,
          background:isCons?"#e8f5e9":"#f0f7ee",
          color:isCons?"#2e7d32":"#2e5c28",
          border:"1px solid",borderColor:isCons?"#a5d6a7":"#a5c8a2",
          textDecoration:isCons?"line-through":"none",
          textAlign:"center"}},d),
        onConsume&&!isCons&&React.createElement("button",{onClick:()=>onConsume(i),
          style:{border:"none",background:"#e8f5e9",color:"#2e7d32",borderRadius:4,cursor:"pointer",fontSize:9,padding:"1px 3px"}},"✓")
      );
    })
  );
}

function App() {
  const [tab,setTab]=useState("dispensa");
  const [inventory,setInventory]=useState(()=>load(SK.inv,[]));
  const [baseMenu,setBaseMenu]=useState(()=>load(SK.base,emptyBase()));
  const [weeklyMenus,setWeeklyMenus]=useState(()=>load(SK.weekly,{}));

  useEffect(()=>save(SK.inv,inventory),[inventory]);
  useEffect(()=>save(SK.base,baseMenu),[baseMenu]);
  useEffect(()=>save(SK.weekly,weeklyMenus),[weeklyMenus]);

  const tabs=[
    {id:"dispensa",label:"🏪 Dispensa"},
    {id:"basemenu",label:"📋 Menù Base"},
    {id:"weekly",label:"📅 Settimana"},
    {id:"shopping",label:"🛒 Spesa"},
  ];

  return React.createElement("div",{style:{minHeight:"100vh",background:"#FAF7F2"}},
    React.createElement("div",{style:{background:"#5C7A5A",color:"#FAF7F2",padding:"16px 16px 0",boxShadow:"0 2px 12px #0002",position:"sticky",top:0,zIndex:100}},
      React.createElement("div",{style:{maxWidth:960,margin:"0 auto"}},
        React.createElement("h1",{style:{margin:"0 0 2px",fontSize:20,fontWeight:700}},"🥫 La Mia Dispensa"),
        React.createElement("p",{style:{margin:"0 0 12px",fontSize:12,opacity:.8}},"Inventario · Menù · Spesa"),
        React.createElement("div",{style:{display:"flex",gap:3,overflowX:"auto"}},
          tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>setTab(t.id),style:{
            background:tab===t.id?"#FAF7F2":"transparent",
            color:tab===t.id?"#5C7A5A":"#FAF7F2",
            border:"none",borderRadius:"8px 8px 0 0",padding:"8px 12px",
            fontWeight:600,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0
          }},t.label))
        )
      )
    ),
    React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"20px 12px 40px"}},
      tab==="dispensa"&&React.createElement(DispensaTab,{inventory,setInventory}),
      tab==="basemenu"&&React.createElement(BaseMenuTab,{baseMenu,setBaseMenu}),
      tab==="weekly"&&React.createElement(WeeklyTab,{baseMenu,weeklyMenus,setWeeklyMenus,inventory,setInventory}),
      tab==="shopping"&&React.createElement(ShoppingTab,{inventory,weeklyMenus,baseMenu})
    )
  );
}

// ── DISPENSA TAB ─────────────────────────────────────────────────
function DispensaTab({inventory,setInventory}) {
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [filterCat,setFilterCat]=useState("Tutte");
  const [filterStatus,setFilterStatus]=useState("Tutti");
  const [search,setSearch]=useState("");
  const ef={name:"",category:"Pasta & Riso",quantity:1,unit:"pz",expiry:"",notes:""};
  const [form,setForm]=useState(ef);
  const sf=f=>setForm(p=>({...p,...f}));

  const resetForm=()=>{setForm(ef);setEditId(null);};
  const handleSave=()=>{
    if(!form.name.trim()) return;
    if(editId!==null){setInventory(inv=>inv.map(i=>i.id===editId?{...i,...form}:i));}
    else{setInventory(inv=>[...inv,{...form,id:Date.now()}]);}
    setShowForm(false);resetForm();
  };
  const handleEdit=(item)=>{
    setForm({name:item.name,category:item.category,quantity:item.quantity,unit:item.unit,expiry:item.expiry||"",notes:item.notes||""});
    setEditId(item.id);setShowForm(true);
  };
  const handleDelete=(id)=>{if(window.confirm("Eliminare questo prodotto?"))setInventory(inv=>inv.filter(i=>i.id!==id));};
  const adjustQty=(id,delta)=>setInventory(inv=>inv.map(i=>i.id===id?{...i,quantity:Math.max(0,i.quantity+delta)}:i));

  const filtered=inventory.filter(i=>{
    return(filterCat==="Tutte"||i.category===filterCat)&&
           (filterStatus==="Tutti"||expiryStatus(i.expiry)===filterStatus)&&
           i.name.toLowerCase().includes(search.toLowerCase());
  });
  const grouped={};
  filtered.forEach(i=>{if(!grouped[i.category])grouped[i.category]=[];grouped[i.category].push(i);});
  const expiredCount=inventory.filter(i=>expiryStatus(i.expiry)==="expired").length;
  const soonCount=inventory.filter(i=>expiryStatus(i.expiry)==="soon").length;

  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}},
      [{label:"Totali",value:inventory.length,bg:"#e8f5e9",color:"#2e7d32"},
       {label:"In scadenza",value:soonCount,bg:"#fff8e1",color:"#f57f17"},
       {label:"Scaduti",value:expiredCount,bg:"#ffebee",color:"#c62828"}
      ].map(s=>React.createElement("div",{key:s.label,style:{flex:"1 1 100px",background:s.bg,borderRadius:12,padding:"10px 14px",minWidth:90}},
        React.createElement("div",{style:{fontSize:22,fontWeight:700,color:s.color}},s.value),
        React.createElement("div",{style:{fontSize:11,color:s.color,opacity:.8}},s.label)
      ))
    ),
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}},
      React.createElement("input",{placeholder:"🔍 Cerca...",value:search,onChange:e=>setSearch(e.target.value),style:{...inp,flex:1,minWidth:130}}),
      React.createElement("select",{value:filterCat,onChange:e=>setFilterCat(e.target.value),style:{...inp,width:"auto"}},
        React.createElement("option",null,"Tutte"),
        CATEGORIES.map(c=>React.createElement("option",{key:c},c))
      ),
      React.createElement("select",{value:filterStatus,onChange:e=>setFilterStatus(e.target.value),style:{...inp,width:"auto"}},
        React.createElement("option",{value:"Tutti"},"Tutti"),
        React.createElement("option",{value:"ok"},"OK"),
        React.createElement("option",{value:"soon"},"In scadenza"),
        React.createElement("option",{value:"expired"},"Scaduti")
      ),
      React.createElement("button",{onClick:()=>{resetForm();setShowForm(true);},style:btn("#5C7A5A")},"+ Aggiungi")
    ),
    showForm&&React.createElement("div",{style:{background:"#fff",borderRadius:14,padding:16,marginBottom:16,border:"1.5px solid #d4c9b8",boxShadow:"0 2px 12px #0001"}},
      React.createElement("h3",{style:{margin:"0 0 14px",color:"#5C7A5A",fontSize:16}},editId?"Modifica prodotto":"Nuovo prodotto"),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}},
        React.createElement("div",null,React.createElement("label",{style:lbl},"Nome *"),React.createElement("input",{value:form.name,onChange:e=>sf({name:e.target.value}),style:inp,placeholder:"es. Spaghetti"})),
        React.createElement("div",null,React.createElement("label",{style:lbl},"Categoria"),React.createElement("select",{value:form.category,onChange:e=>sf({category:e.target.value}),style:inp},CATEGORIES.map(c=>React.createElement("option",{key:c},c)))),
        React.createElement("div",null,React.createElement("label",{style:lbl},"Quantità"),React.createElement("input",{type:"number",min:"0",value:form.quantity,onChange:e=>sf({quantity:Number(e.target.value)}),style:inp})),
        React.createElement("div",null,React.createElement("label",{style:lbl},"Unità"),React.createElement("select",{value:form.unit,onChange:e=>sf({unit:e.target.value}),style:inp},UNITS.map(u=>React.createElement("option",{key:u},u)))),
        React.createElement("div",null,React.createElement("label",{style:lbl},"Scadenza"),React.createElement("input",{type:"date",value:form.expiry,onChange:e=>sf({expiry:e.target.value}),style:inp})),
        React.createElement("div",null,React.createElement("label",{style:lbl},"Note"),React.createElement("input",{value:form.notes,onChange:e=>sf({notes:e.target.value}),style:inp,placeholder:"facoltativo"}))
      ),
      React.createElement("div",{style:{display:"flex",gap:8,marginTop:14}},
        React.createElement("button",{onClick:handleSave,style:btn("#5C7A5A")},"💾 Salva"),
        React.createElement("button",{onClick:()=>{setShowForm(false);resetForm();},style:btn("#9e9e9e")},"Annulla")
      )
    ),
    Object.keys(grouped).length===0?
      React.createElement("div",{style:{textAlign:"center",padding:60,color:"#9e8c7a"}},
        React.createElement("div",{style:{fontSize:48}},"📦"),
        React.createElement("p",{style:{marginTop:12}},"La dispensa è vuota. Aggiungi il primo prodotto!")
      ):
      Object.entries(grouped).map(([cat,items])=>React.createElement("div",{key:cat,style:{marginBottom:18}},
        React.createElement("h3",{style:{margin:"0 0 8px",fontSize:15,color:"#5C7A5A",display:"flex",alignItems:"center",gap:5}},
          CAT_ICONS[cat]||"📦"," ",cat," ",React.createElement("span",{style:{color:"#9e8c7a",fontWeight:400,fontSize:12}},"(",items.length,")")
        ),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:7}},
          items.map(item=>{
            const st=ST[expiryStatus(item.expiry)];
            return React.createElement("div",{key:item.id,style:{background:"#fff",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,border:"1.5px solid #ede8e0",flexWrap:"wrap"}},
              React.createElement("div",{style:{flex:1,minWidth:100}},
                React.createElement("span",{style:{fontWeight:600,fontSize:14}},item.name),
                item.notes&&React.createElement("span",{style:{color:"#9e8c7a",fontSize:12,marginLeft:6}},"(",item.notes,")")
              ),
              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:5}},
                React.createElement("button",{onClick:()=>adjustQty(item.id,-1),style:{...sBtn,background:"#f0ebe3"}},"−"),
                React.createElement("span",{style:{fontWeight:700,minWidth:50,textAlign:"center",fontSize:14}},item.quantity," ",item.unit),
                React.createElement("button",{onClick:()=>adjustQty(item.id,+1),style:{...sBtn,background:"#e8f5e9",color:"#2e7d32"}},"+")
              ),
              item.expiry&&React.createElement("span",{style:{background:st.bg,color:st.color,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600}},
                fmtDate(item.expiry)," · ",st.label
              ),
              React.createElement("div",{style:{display:"flex",gap:5}},
                React.createElement("button",{onClick:()=>handleEdit(item),style:{...sBtn,background:"#e3f0ff",color:"#1565c0"}},"✏️"),
                React.createElement("button",{onClick:()=>handleDelete(item.id),style:{...sBtn,background:"#ffebee",color:"#c62828"}},"🗑️")
              )
            );
          })
        )
      ))
  );
}

// ── BASE MENU TAB ─────────────────────────────────────────────────
function BaseMenuTab({baseMenu,setBaseMenu}) {
  const [activeWeek,setActiveWeek]=useState("Settimana 1");
  const [editing,setEditing]=useState(null); // "day-meal"

  const getDishes=(day,meal)=>(baseMenu[activeWeek]?.[day]?.[meal])||[];

  const saveCell=(day,meal,dishes)=>{
    setBaseMenu(m=>({
      ...m,
      [activeWeek]:{
        ...(m[activeWeek]||{}),
        [day]:{
          ...(m[activeWeek]?.[day]||{}),
          [meal]:dishes
        }
      }
    }));
    setEditing(null);
  };

  return React.createElement("div",null,
    React.createElement("h2",{style:{margin:"0 0 4px",color:"#5C7A5A"}},"📋 Menù Base"),
    React.createElement("p",{style:{margin:"0 0 14px",color:"#9e8c7a",fontSize:13}},"Programmazione a 15 giorni — tocca una cella per modificare le portate"),
    // Week tabs
    React.createElement("div",{style:{display:"flex",gap:6,marginBottom:16}},
      WEEKS.map(w=>React.createElement("button",{key:w,onClick:()=>{setActiveWeek(w);setEditing(null);},style:{
        padding:"7px 18px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,
        background:activeWeek===w?"#5C7A5A":"#e8e2d9",color:activeWeek===w?"#fff":"#6B4E3D"
      }},w))
    ),
    React.createElement("div",{style:{overflowX:"auto",WebkitOverflowScrolling:"touch"}},
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px #0001",minWidth:580}},
        React.createElement("thead",null,
          React.createElement("tr",{style:{background:"#5C7A5A",color:"#FAF7F2"}},
            React.createElement("th",{style:{padding:"10px 12px",textAlign:"left",fontWeight:600,fontSize:13}},"Pasto"),
            DAYS.map(d=>React.createElement("th",{key:d,style:{padding:"10px 5px",fontWeight:600,fontSize:12}},d.slice(0,3)))
          )
        ),
        React.createElement("tbody",null,
          MEALS.map((meal,mi)=>React.createElement("tr",{key:meal,style:{background:mi%2===0?"#FAF7F2":"#fff",verticalAlign:"top"}},
            React.createElement("td",{style:{padding:"10px 12px",fontWeight:600,color:"#6B4E3D",fontSize:13,whiteSpace:"nowrap"}},
              (meal==="Pranzo"?"🍽️":"🌙")+" "+meal
            ),
            DAYS.map(day=>{
              const key=day+"-"+meal;
              const isEd=editing===key;
              const dishes=getDishes(day,meal);
              return React.createElement("td",{key:day,style:{padding:"6px 4px",textAlign:"center",minWidth:95,verticalAlign:"top"}},
                isEd?
                  React.createElement(CellEditor,{dishes,onSave:d=>saveCell(day,meal,d),onCancel:()=>setEditing(null)}):
                  React.createElement(CellDisplay,{dishes,onClick:()=>setEditing(key)})
              );
            })
          ))
        )
      )
    )
  );
}

// ── WEEKLY MENU TAB ──────────────────────────────────────────────
function WeeklyTab({baseMenu,weeklyMenus,setWeeklyMenus,inventory,setInventory}) {
  const [weekKey,setWeekKey]=useState(()=>getWeekKey(new Date()));
  const [editing,setEditing]=useState(null);
  const [consumed,setConsumed]=useState({}); // {"weekKey-day-meal-idx": true}

  const wm=weeklyMenus[weekKey]||{};

  // Returns array of dishes; weekly overrides base
  const getCell=(day,meal)=>{
    if(wm[day]&&wm[day][meal]!==undefined) return wm[day][meal];
    // figure out which base week to use based on week number of year
    const d=new Date(weekKey);
    const startOfYear=new Date(d.getFullYear(),0,1);
    const weekNum=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
    const baseWeek=weekNum%2===1?"Settimana 1":"Settimana 2";
    return (baseMenu[baseWeek]?.[day]?.[meal])||[];
  };

  const saveCell=(day,meal,dishes)=>{
    setWeeklyMenus(w=>({...w,[weekKey]:{...(w[weekKey]||{}),[day]:{...(w[weekKey]?.[day]||{}),[meal]:dishes}}}));
    setEditing(null);
  };

  const changeWeek=(delta)=>{
    const d=new Date(weekKey);d.setDate(d.getDate()+delta*7);setWeekKey(getWeekKey(d));
    setEditing(null);
  };

  const weekLabel=()=>{
    const d=new Date(weekKey);const end=new Date(weekKey);end.setDate(end.getDate()+6);
    return d.getDate()+"/"+(d.getMonth()+1)+" – "+end.getDate()+"/"+(end.getMonth()+1)+"/"+end.getFullYear();
  };

  const copyFromBase=()=>{
    const d=new Date(weekKey);
    const startOfYear=new Date(d.getFullYear(),0,1);
    const weekNum=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
    const baseWeek=weekNum%2===1?"Settimana 1":"Settimana 2";
    const copy={};
    DAYS.forEach(day=>{copy[day]={};MEALS.forEach(m=>{copy[day][m]=[...(baseMenu[baseWeek]?.[day]?.[m]||[])];});});
    setWeeklyMenus(w=>({...w,[weekKey]:copy}));
  };

  const resetToBase=()=>{
    if(window.confirm("Ripristinare il menù base per questa settimana?"))
      setWeeklyMenus(w=>{const n={...w};delete n[weekKey];return n;});
  };

  const ck=(day,meal,idx)=>weekKey+"-"+day+"-"+meal+"-"+idx;

  const markConsumed=(day,meal,idx)=>{
    const k=ck(day,meal,idx);
    const dishes=getCell(day,meal);
    const dish=dishes[idx];
    if(!dish||consumed[k]) return;
    const match=inventory.find(i=>i.name.toLowerCase()===dish.toLowerCase()&&i.quantity>0);
    if(match) setInventory(inv=>inv.map(i=>i.id===match.id?{...i,quantity:i.quantity-1}:i));
    setConsumed(c=>({...c,[k]:true}));
  };

  // figure out current base week label
  const d=new Date(weekKey);
  const startOfYear=new Date(d.getFullYear(),0,1);
  const weekNum=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
  const baseWeekLabel=weekNum%2===1?"Settimana 1":"Settimana 2";

  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}},
      React.createElement("div",null,
        React.createElement("h2",{style:{margin:"0 0 2px",color:"#5C7A5A"}},"📅 Menù Settimanale"),
        React.createElement("p",{style:{margin:0,color:"#9e8c7a",fontSize:12}},"Base applicata: "+baseWeekLabel+" · Tocca una cella per modificare")
      ),
      React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
        React.createElement("button",{onClick:()=>changeWeek(-1),style:{...sBtn,fontSize:18,padding:"4px 10px"}},"‹"),
        React.createElement("span",{style:{fontWeight:600,fontSize:13,color:"#5C7A5A"}},weekLabel()),
        React.createElement("button",{onClick:()=>changeWeek(+1),style:{...sBtn,fontSize:18,padding:"4px 10px"}},"›"),
        React.createElement("button",{onClick:copyFromBase,style:btn("#D47A3E",true)},"📋 Copia base"),
        React.createElement("button",{onClick:resetToBase,style:btn("#9e9e9e",true)},"↺ Reset")
      )
    ),
    React.createElement("div",{style:{overflowX:"auto",WebkitOverflowScrolling:"touch"}},
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px #0001",minWidth:580}},
        React.createElement("thead",null,
          React.createElement("tr",{style:{background:"#5C7A5A",color:"#FAF7F2"}},
            React.createElement("th",{style:{padding:"10px 12px",textAlign:"left",fontWeight:600,fontSize:13}},"Pasto"),
            DAYS.map(d=>React.createElement("th",{key:d,style:{padding:"10px 5px",fontWeight:600,fontSize:12}},d.slice(0,3)))
          )
        ),
        React.createElement("tbody",null,
          MEALS.map((meal,mi)=>React.createElement("tr",{key:meal,style:{background:mi%2===0?"#FAF7F2":"#fff",verticalAlign:"top"}},
            React.createElement("td",{style:{padding:"10px 12px",fontWeight:600,color:"#6B4E3D",fontSize:13,whiteSpace:"nowrap"}},
              (meal==="Pranzo"?"🍽️":"🌙")+" "+meal
            ),
            DAYS.map(day=>{
              const key=day+"-"+meal;
              const isEd=editing===key;
              const dishes=getCell(day,meal);
              const consumedMap={};
              dishes.forEach((_,i)=>{consumedMap[i]=!!consumed[ck(day,meal,i)];});
              return React.createElement("td",{key:day,style:{padding:"6px 4px",minWidth:95,verticalAlign:"top"}},
                isEd?
                  React.createElement(CellEditor,{dishes,onSave:d=>saveCell(day,meal,d),onCancel:()=>setEditing(null)}):
                  React.createElement(CellDisplay,{dishes,onClick:()=>setEditing(key),consumed:consumedMap,onConsume:(idx)=>markConsumed(day,meal,idx)})
              );
            })
          ))
        )
      )
    ),
    React.createElement("p",{style:{fontSize:11,color:"#9e8c7a",marginTop:10}},"✓ su ogni portata = segna come consumata e scala l'inventario")
  );
}

// ── SHOPPING TAB ─────────────────────────────────────────────────
function ShoppingTab({inventory,weeklyMenus,baseMenu}) {
  const now=new Date();
  const [month,setMonth]=useState(now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const [extraItems,setExtraItems]=useState([]);
  const [newExtra,setNewExtra]=useState({name:"",quantity:1,unit:"pz"});
  const [checked,setChecked]=useState({});

  const [year,mon]=month.split("-").map(Number);

  // Returns all weeks (Mon keys) that fall in the selected month
  const getMonthWeeks=()=>{
    const weeks=[];
    const firstDay=new Date(year,mon-1,1);
    const lastDay=new Date(year,mon,0);
    // go back to Monday of the first week
    const start=new Date(firstDay);
    start.setDate(start.getDate()-((start.getDay()+6)%7));
    const cur=new Date(start);
    while(cur<=lastDay){
      weeks.push(getWeekKey(cur));
      cur.setDate(cur.getDate()+7);
    }
    return weeks;
  };

  // For a given weekKey, get the base week label to fall back on
  const getBaseWeekLabel=(wk)=>{
    const d=new Date(wk);
    const startOfYear=new Date(d.getFullYear(),0,1);
    const weekNum=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
    return weekNum%2===1?"Settimana 1":"Settimana 2";
  };

  // Count occurrences of each dish across the month
  // For each week: if weekly menu exists use it, else use base
  const getDishCounts=()=>{
    const counts={};
    const add=(dish)=>{
      if(!dish||!dish.trim()) return;
      const k=dish.trim().toLowerCase();
      if(!counts[k]) counts[k]={name:dish.trim(),count:0};
      counts[k].count++;
    };
    getMonthWeeks().forEach(wk=>{
      const wm=weeklyMenus[wk];
      if(wm){
        // use weekly menu for this week
        DAYS.forEach(day=>MEALS.forEach(meal=>{
          (wm[day]?.[meal]||[]).forEach(add);
        }));
      } else {
        // fall back to base menu
        const bw=getBaseWeekLabel(wk);
        DAYS.forEach(day=>MEALS.forEach(meal=>{
          ((baseMenu[bw]?.[day]?.[meal])||[]).forEach(add);
        }));
      }
    });
    return Object.values(counts);
  };

  const dishCounts=getDishCounts();

  // Categorize: missing (0 in stock), insufficient (stock < needed), ok (stock >= needed)
  const categorized=dishCounts.map(({name,count})=>{
    const match=inventory.find(i=>i.name.toLowerCase()===name.toLowerCase());
    const inStock=match?match.quantity:0;
    const unit=match?match.unit:"pz";
    const needed=count;
    const toBuy=Math.max(0,needed-inStock);
    return {name,count,inStock,unit,needed,toBuy};
  });

  const missing=categorized.filter(d=>d.inStock===0);
  const insufficient=categorized.filter(d=>d.inStock>0&&d.toBuy>0);
  const ok=categorized.filter(d=>d.toBuy===0);

  const toggle=(k)=>setChecked(c=>({...c,[k]:!c[k]}));
  const addExtra=()=>{
    if(!newExtra.name.trim()) return;
    setExtraItems(e=>[...e,{...newExtra,id:Date.now()}]);
    setNewExtra({name:"",quantity:1,unit:"pz"});
  };
  const changeMonth=(delta)=>{
    const [y,m]=month.split("-").map(Number);
    const d=new Date(y,m-1+delta,1);
    setMonth(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));
  };
  const monthLabel=new Date(year,mon-1,1).toLocaleDateString("it-IT",{month:"long",year:"numeric"});

  const rowStyle={display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #f0ebe3"};

  const DishRow=({d,accentColor})=>React.createElement("div",{style:rowStyle},
    React.createElement("input",{type:"checkbox",checked:!!checked[d.name],onChange:()=>toggle(d.name),
      style:{width:18,height:18,accentColor,cursor:"pointer",flexShrink:0}}),
    React.createElement("span",{style:{flex:1,textDecoration:checked[d.name]?"line-through":"none",
      color:checked[d.name]?"#9e8c7a":"inherit",fontSize:14}},d.name),
    React.createElement("span",{style:{fontSize:12,color:"#9e8c7a",whiteSpace:"nowrap"}},
      "×"+d.needed+" nel mese"),
    React.createElement("span",{style:{fontSize:12,fontWeight:700,color:accentColor,
      background:accentColor==="#c62828"?"#ffebee":"#fff3e0",
      borderRadius:20,padding:"2px 9px",whiteSpace:"nowrap"}},
      "Compra "+d.toBuy+" "+d.unit)
  );

  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}},
      React.createElement("div",null,
        React.createElement("h2",{style:{margin:"0 0 4px",color:"#5C7A5A"}},"🛒 Lista della Spesa"),
        React.createElement("p",{style:{margin:0,color:"#9e8c7a",fontSize:13}},"Settimane con menù proprio usano quello, le altre il menù base")
      ),
      React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        React.createElement("button",{onClick:()=>changeMonth(-1),style:{...sBtn,fontSize:18,padding:"4px 10px"}},"‹"),
        React.createElement("span",{style:{fontWeight:600,fontSize:13,color:"#5C7A5A",textTransform:"capitalize"}},monthLabel),
        React.createElement("button",{onClick:()=>changeMonth(+1),style:{...sBtn,fontSize:18,padding:"4px 10px"}},"›")
      )
    ),

    // Mancanti del tutto
    React.createElement("div",{style:{background:"#fff",borderRadius:14,padding:16,marginBottom:14,border:"1.5px solid #ede8e0"}},
      React.createElement("h3",{style:{margin:"0 0 12px",color:"#c62828",fontSize:15}},"❌ Da acquistare ("+missing.length+")"),
      missing.length===0?
        React.createElement("p",{style:{color:"#9e8c7a",margin:0}},"🎉 Nessun prodotto completamente mancante!"):
        missing.map(d=>React.createElement(DishRow,{key:d.name,d,accentColor:"#c62828"}))
    ),

    // Insufficienti
    insufficient.length>0&&React.createElement("div",{style:{background:"#fff",borderRadius:14,padding:16,marginBottom:14,border:"1.5px solid #ede8e0"}},
      React.createElement("h3",{style:{margin:"0 0 12px",color:"#f57f17",fontSize:15}},"⚠️ Insufficienti ("+insufficient.length+")"),
      insufficient.map(d=>React.createElement(DishRow,{key:d.name,d,accentColor:"#f57f17"}))
    ),

    // Extra
    React.createElement("div",{style:{background:"#fff",borderRadius:14,padding:16,marginBottom:14,border:"1.5px solid #ede8e0"}},
      React.createElement("h3",{style:{margin:"0 0 12px",color:"#D47A3E",fontSize:15}},"➕ Extra / Detersivi"),
      React.createElement("div",{style:{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}},
        React.createElement("input",{value:newExtra.name,onChange:e=>setNewExtra({...newExtra,name:e.target.value}),placeholder:"Nome prodotto",style:{...inp,flex:1,minWidth:120}}),
        React.createElement("input",{type:"number",min:"1",value:newExtra.quantity,onChange:e=>setNewExtra({...newExtra,quantity:Number(e.target.value)}),style:{...inp,width:65}}),
        React.createElement("select",{value:newExtra.unit,onChange:e=>setNewExtra({...newExtra,unit:e.target.value}),style:{...inp,width:80}},
          UNITS.map(u=>React.createElement("option",{key:u},u))
        ),
        React.createElement("button",{onClick:addExtra,style:btn("#D47A3E")},"+ Aggiungi")
      ),
      extraItems.map(item=>React.createElement("div",{key:item.id,style:rowStyle},
        React.createElement("input",{type:"checkbox",checked:!!checked["x-"+item.id],onChange:()=>toggle("x-"+item.id),style:{width:18,height:18,accentColor:"#D47A3E",cursor:"pointer",flexShrink:0}}),
        React.createElement("span",{style:{flex:1,textDecoration:checked["x-"+item.id]?"line-through":"none",color:checked["x-"+item.id]?"#9e8c7a":"inherit",fontSize:14}},
          item.name+" — "+item.quantity+" "+item.unit
        ),
        React.createElement("button",{onClick:()=>setExtraItems(e=>e.filter(i=>i.id!==item.id)),style:{...sBtn,background:"#ffebee",color:"#c62828",padding:"3px 8px"}},"✕")
      ))
    ),

    // Già ok
    React.createElement("div",{style:{background:"#fff",borderRadius:14,padding:16,border:"1.5px solid #ede8e0"}},
      React.createElement("h3",{style:{margin:"0 0 12px",color:"#2e7d32",fontSize:15}},"✅ Già sufficienti ("+ok.length+")"),
      ok.length===0?React.createElement("p",{style:{color:"#9e8c7a",margin:0}},"—"):
      ok.map(d=>{
        const match=inventory.find(i=>i.name.toLowerCase()===d.name.toLowerCase());
        return React.createElement("div",{key:d.name,style:rowStyle},
          React.createElement("span",{style:{color:"#2e7d32",flexShrink:0}},"✓"),
          React.createElement("span",{style:{flex:1,fontSize:14}},d.name),
          React.createElement("span",{style:{fontSize:12,color:"#9e8c7a"}},"×"+d.needed+" · hai "+d.inStock+" "+(match?match.unit:"pz"))
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
